name: CI Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # -------------------------------------------------------
  # 1. BUILD & TEST
  # Valida que o código roda e testes passam antes de qualquer scan
  # -------------------------------------------------------
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: |
          # Roda testes se existirem; não falha o pipeline se não houver
          pytest --tb=short || echo "No tests found or tests failed - review needed"

  # -------------------------------------------------------
  # 2. SAST - Bandit
  # Análise estática leve de segurança para Python
  # Complementa o CodeQL (que é mais profundo, roda em workflow separado)
  # -------------------------------------------------------
  sast-bandit:
    name: SAST - Bandit
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit
        run: |
          bandit -r src/ \
            --severity-level medium \
            --confidence-level medium \
            -f json \
            -o bandit-report.json \
            || true  # Não quebra o pipeline, mas gera o relatório

      - name: Show Bandit summary
        run: |
          pip install jq 2>/dev/null || true
          python3 -c "
          import json, sys
          with open('bandit-report.json') as f:
              data = json.load(f)
          metrics = data.get('metrics', {})
          results = data.get('results', [])
          print(f'Issues found: {len(results)}')
          for r in results:
              print(f'  [{r[\"issue_severity\"]}] {r[\"issue_text\"]} — {r[\"filename\"]}:{r[\"line_number\"]}')
          "

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 30

  # -------------------------------------------------------
  # 3. SCA - pip-audit
  # Verifica dependências com CVEs conhecidas
  # Complementa o Dependabot (que abre PRs, este bloqueia o CI)
  # -------------------------------------------------------
  sca-pip-audit:
    name: SCA - pip-audit
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: |
          pip-audit \
            -r requirements.txt \
            --format json \
            --output pip-audit-report.json \
            || true  # Não quebra o pipeline (dependências propositalmente vuln na PoC)

      - name: Show pip-audit summary
        run: |
          python3 -c "
          import json
          with open('pip-audit-report.json') as f:
              data = json.load(f)
          deps = data.get('dependencies', [])
          vuln_deps = [d for d in deps if d.get('vulns')]
          print(f'Vulnerable packages: {len(vuln_deps)}')
          for d in vuln_deps:
              for v in d['vulns']:
                  print(f'  {d[\"name\"]}=={d[\"version\"]} — {v[\"id\"]}: {v[\"description\"][:80]}...')
          "

      - name: Upload pip-audit report
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json
          retention-days: 30

  # -------------------------------------------------------
  # 4. SECURITY SUMMARY
  # Job final que consolida o status de todos os scans
  # Ideal para mostrar na entrevista como "gate" de segurança
  # -------------------------------------------------------
  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [sast-bandit, sca-pip-audit]
    if: always()

    steps:
      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: reports/

      - name: Print security summary
        run: |
          echo "========================================"
          echo "         SECURITY SCAN SUMMARY         "
          echo "========================================"
          echo ""

          echo "[ SAST - Bandit ]"
          python3 -c "
          import json
          try:
              with open('reports/bandit-report/bandit-report.json') as f:
                  data = json.load(f)
              results = data.get('results', [])
              high = [r for r in results if r['issue_severity'] == 'HIGH']
              med  = [r for r in results if r['issue_severity'] == 'MEDIUM']
              print(f'  HIGH: {len(high)} | MEDIUM: {len(med)} | TOTAL: {len(results)}')
          except Exception as e:
              print(f'  Could not parse report: {e}')
          "

          echo ""
          echo "[ SCA - pip-audit ]"
          python3 -c "
          import json
          try:
              with open('reports/pip-audit-report/pip-audit-report.json') as f:
                  data = json.load(f)
              deps = data.get('dependencies', [])
              vuln = [d for d in deps if d.get('vulns')]
              total_cves = sum(len(d['vulns']) for d in vuln)
              print(f'  Vulnerable packages: {len(vuln)} | Total CVEs: {total_cves}')
          except Exception as e:
              print(f'  Could not parse report: {e}')
          "

          echo ""
          echo "[ SAST - CodeQL ]"
          echo "  Runs in separate workflow (codeql.yml) — check Security tab"
          echo ""
          echo "[ Secret Scanning ]"
          echo "  Managed by GHAS — check Security > Secret scanning"
          echo ""
          echo "[ SCA - Dependabot ]"
          echo "  Managed by GHAS — check Security > Dependabot alerts"
          echo "========================================"
